<!DOCTYPE html>
<html lang="es">
<head>
<base target="_top">
<meta charset="utf-8">
<title>Satori OS</title>
<style>
/* ── Tokens (DESIGN.md §2-4, Registro A) ─────────────────────────────────── */
:root{
  --color-bg:#F7F6F3; --color-surface:#FFFFFF; --color-surface-2:#F0EEEA;
  --color-border:#E2DFD8; --color-border-strong:#C9C4B8;
  --color-text:#1C1B19; --color-text-muted:#5C5A54; --color-text-subtle:#8A877E;
  --color-primary:#1F6F5C; --color-primary-hover:#1A5E4E; --color-primary-weak:#E3F0EC; --color-on-primary:#FFFFFF;
  --color-success:#2E7D49; --color-success-weak:#E6F2E9;
  --color-warning:#B5740F; --color-warning-weak:#FBF0DC;
  --color-danger:#B23A2E; --color-danger-weak:#F8E5E2;
  --color-info:#2C6E8F; --color-info-weak:#E4EFF4;
  --color-focus-ring:#1F6F5C;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,monospace;
  --text-xs:0.75rem; --text-sm:0.875rem; --text-base:1rem; --text-lg:1.125rem; --text-xl:1.5rem; --text-2xl:1.953rem;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600;
  --leading-tight:1.25; --leading-normal:1.5;
  --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem; --space-5:1.5rem; --space-6:2rem; --space-8:3rem;
  --radius-sm:4px; --radius-md:8px; --radius-lg:12px; --radius-full:9999px;
  --shadow-sm:0 1px 2px rgba(28,27,25,.06); --shadow-md:0 2px 8px rgba(28,27,25,.08); --shadow-lg:0 8px 24px rgba(28,27,25,.12);
  --sidebar-w:248px; --header-h:56px; --container-max:1280px;
}
:root[data-theme="dark"]{
  --color-bg:#14140F; --color-surface:#1C1C17; --color-surface-2:#24241E;
  --color-border:#33332B; --color-border-strong:#474740;
  --color-text:#ECEAE3; --color-text-muted:#ADAB9F; --color-text-subtle:#7C7A70;
  --color-primary:#4FB89C; --color-primary-hover:#5FC9AC; --color-primary-weak:#16352C; --color-on-primary:#0B1A15;
  --color-success:#5FB97A; --color-success-weak:#16301E;
  --color-warning:#D79A3D; --color-warning-weak:#322611;
  --color-danger:#DD6B5C; --color-danger-weak:#34170F;
  --color-info:#5FA8C9; --color-info-weak:#122A35;
  --color-focus-ring:#4FB89C;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 2px 8px rgba(0,0,0,.35); --shadow-lg:0 8px 24px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);font-size:var(--text-base);line-height:var(--leading-normal);-webkit-font-smoothing:antialiased}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
a{color:var(--color-primary);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Header ──────────────────────────────────────────────────────────────── */
header{position:sticky;top:0;z-index:30;height:var(--header-h);display:flex;align-items:center;gap:var(--space-3);
  padding:0 var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-border)}
.brand{font-weight:var(--weight-semibold);font-size:var(--text-lg);letter-spacing:-.01em}
.brand small{color:var(--color-text-subtle);font-weight:var(--weight-regular);font-size:var(--text-xs);margin-left:var(--space-1)}
.header-spacer{flex:1}
.sync{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted)}
.dot{width:8px;height:8px;border-radius:var(--radius-full);background:var(--color-text-subtle);flex:none}
.dot.ok{background:var(--color-success)} .dot.warn{background:var(--color-warning)} .dot.err{background:var(--color-danger)}
.iconbtn{appearance:none;border:1px solid var(--color-border-strong);background:transparent;color:var(--color-text);
  width:34px;height:34px;border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-base);line-height:1;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--color-surface-2)}
#menuBtn{display:none}

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout{display:flex;max-width:var(--container-max);margin:0 auto;min-height:calc(100vh - var(--header-h))}
nav.side{width:var(--sidebar-w);flex:none;border-right:1px solid var(--color-border);background:var(--color-surface);padding:var(--space-4) var(--space-2);overflow-y:auto}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);cursor:pointer;color:var(--color-text-muted);font-size:var(--text-sm);user-select:none}
.navitem:hover{background:var(--color-surface-2);color:var(--color-text)}
.navitem.active{background:var(--color-primary-weak);color:var(--color-primary);font-weight:var(--weight-medium)}
.navitem .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.navlabel{padding:var(--space-3) var(--space-3) var(--space-1);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-subtle)}
main{flex:1;padding:var(--space-5);min-width:0}
.scrim{display:none}

/* ── Tipografía de página ────────────────────────────────────────────────── */
h1{font-size:var(--text-2xl);font-weight:var(--weight-semibold);margin:0 0 var(--space-1);letter-spacing:-.02em}
h2.section{font-size:var(--text-xl);font-weight:var(--weight-semibold);margin:var(--space-6) 0 var(--space-3)}
.subtle{color:var(--color-text-subtle);font-size:var(--text-sm)}
.muted{color:var(--color-text-muted)}

/* ── Cards / grid ────────────────────────────────────────────────────────── */
.grid{display:grid;gap:var(--space-4)}
.kpis{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:var(--space-4)}
.cols2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5);box-shadow:var(--shadow-sm)}
.card h3{margin:0 0 var(--space-3);font-size:var(--text-base);font-weight:var(--weight-semibold)}
.kpi .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:var(--text-2xl);font-weight:var(--weight-semibold);line-height:1.1}
.kpi .lbl{color:var(--color-text-muted);font-size:var(--text-sm);margin-top:var(--space-1)}

/* ── Tabla (DESIGN.md §5) ────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
th{position:sticky;top:0;text-align:left;background:var(--color-surface-2);color:var(--color-text-muted);font-weight:var(--weight-medium);
  padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--color-border);white-space:nowrap;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.04em}
td{padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--color-border);vertical-align:top}
tbody tr:hover{background:var(--color-surface-2)}
td.num,th.num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.tablewrap{overflow-x:auto;border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-surface)}

/* ── Chips ───────────────────────────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:var(--space-1);padding:1px var(--space-2);border-radius:var(--radius-full);
  font-size:var(--text-xs);font-weight:var(--weight-semibold);background:var(--color-surface-2);color:var(--color-text-muted);white-space:nowrap}
.chip.success{background:var(--color-success-weak);color:var(--color-success)}
.chip.warning{background:var(--color-warning-weak);color:var(--color-warning)}
.chip.danger{background:var(--color-danger-weak);color:var(--color-danger)}
.chip.info{background:var(--color-info-weak);color:var(--color-info)}
.chip.primary{background:var(--color-primary-weak);color:var(--color-primary)}

/* ── Aviso row ───────────────────────────────────────────────────────────── */
.aviso{display:flex;gap:var(--space-3);align-items:flex-start;padding:var(--space-3) 0;border-bottom:1px solid var(--color-border)}
.aviso:last-child{border-bottom:0}
.aviso .body{flex:1;min-width:0}
.aviso .msg{font-size:var(--text-sm)}
.bar{height:8px;border-radius:var(--radius-full);background:var(--color-surface-2);overflow:hidden;min-width:80px}
.bar>span{display:block;height:100%;background:var(--color-primary)}

.empty{color:var(--color-text-subtle);font-size:var(--text-sm);padding:var(--space-4) 0;text-align:center}
.btn{appearance:none;cursor:pointer;border:1px solid var(--color-border-strong);background:transparent;color:var(--color-text);
  padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:var(--weight-medium)}
.btn:hover{background:var(--color-surface-2)}
.btn.primary{background:var(--color-primary);color:var(--color-on-primary);border-color:var(--color-primary)}
.btn.primary:hover{background:var(--color-primary-hover)}
:focus-visible{outline:2px solid var(--color-focus-ring);outline-offset:2px}
.row-actions{display:flex;gap:var(--space-3);align-items:center;margin-top:var(--space-4);flex-wrap:wrap}

/* ── Responsive (mobile-first fallback) ──────────────────────────────────── */
@media (max-width:760px){
  #menuBtn{display:flex}
  nav.side{position:fixed;top:var(--header-h);left:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .16s ease;box-shadow:var(--shadow-lg)}
  nav.side.open{transform:translateX(0)}
  .scrim.show{display:block;position:fixed;inset:var(--header-h) 0 0;background:rgba(0,0,0,.35);z-index:35}
  main{padding:var(--space-4)}
  h1{font-size:var(--text-xl)}
}
</style>
</head>
<body>
<header>
  <button id="menuBtn" class="iconbtn" aria-label="Menú">☰</button>
  <div class="brand">Satori OS <small>MAESTRO</small></div>
  <div class="header-spacer"></div>
  <div class="sync" id="syncStatus" title="Última sincronización">
    <span class="dot" id="syncDot"></span><span id="syncText">…</span>
  </div>
  <button id="themeBtn" class="iconbtn" aria-label="Cambiar tema">◐</button>
</header>

<div class="scrim" id="scrim"></div>
<div class="layout">
  <nav class="side" id="side">
    <div class="navitem active" data-view="hoy"><span class="name">📋 Hoy</span></div>
    <div class="navlabel">Clientes</div>
    <div id="clientNav"></div>
  </nav>
  <main id="main"><div class="empty">Cargando…</div></main>
</div>

<script>
// ── helpers DOM (sin innerHTML con datos: todo por textContent → escapado) ──
function el(tag, cls, txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
function chip(txt, kind){var c=el('span','chip'+(kind?' '+kind:''),txt);return c;}
function clear(node){while(node.firstChild)node.removeChild(node.firstChild);}
function fmtNum(n){n=Number(n)||0;return n.toLocaleString('es-ES');}
// PURGA #10: solo aceptar http(s) en href; cualquier otro esquema (javascript:, data:) → ''.
function safeUrl(u){return /^https?:\/\//i.test(String(u||''))?String(u):'';}

var ESTADO_KIND={activo:'success','activo-piloto':'info',potencial:'warning',pausado:''};
var AVISO_KIND={tarea_vencida:'danger',aprobacion_expirada:'danger',sync_error:'danger',tarea_estancada:'warning',proyecto_sin_movimiento:'warning'};
var PRIOR_KIND={A:'danger',B:'warning',C:''};

var state={view:'hoy', cliente:null, clientes:[]};

// ── arranque ────────────────────────────────────────────────────────────────
function init(){
  google.script.run.withSuccessHandler(function(cs){
    state.clientes=cs; renderClientNav(cs);
  }).withFailureHandler(showError).listaClientes();
  loadHoy();
  document.getElementById('themeBtn').onclick=toggleTheme;
  document.getElementById('menuBtn').onclick=function(){toggleSide(true);};
  document.getElementById('scrim').onclick=function(){toggleSide(false);};
}
function toggleTheme(){
  var r=document.documentElement;
  r.setAttribute('data-theme', r.getAttribute('data-theme')==='dark'?'light':'dark');
}
function toggleSide(open){
  document.getElementById('side').classList.toggle('open',open);
  document.getElementById('scrim').classList.toggle('show',open);
}
function setActiveNav(view,id){
  var items=document.querySelectorAll('.navitem');
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var on=(it.getAttribute('data-view')===view)&&(!id||it.getAttribute('data-id')===id);
    it.classList.toggle('active',on);
  }
}
function showError(err){
  var m=document.getElementById('main');clear(m);
  var c=el('div','card');c.appendChild(el('h3',null,'Error'));
  c.appendChild(el('div','muted', String(err&&err.message||err)));
  m.appendChild(c);
}

// ── navegación de clientes ───────────────────────────────────────────────────
function renderClientNav(cs){
  var nav=document.getElementById('clientNav');clear(nav);
  if(!cs.length){nav.appendChild(el('div','navlabel','(sin clientes)'));return;}
  cs.forEach(function(c){
    var it=el('div','navitem');it.setAttribute('data-view','cliente');it.setAttribute('data-id',c.id_cliente);
    it.appendChild(el('span','name',c.nombre));
    it.appendChild(chip(c.estado, ESTADO_KIND[c.estado]||''));
    it.onclick=function(){loadCliente(c.id_cliente);toggleSide(false);};
    nav.appendChild(it);
  });
}

// ── cabecera de sync ─────────────────────────────────────────────────────────
function renderSync(estado){
  var txt=document.getElementById('syncText'), dot=document.getElementById('syncDot');
  var est=String(estado.ultima_sync_estado||'');
  dot.className='dot '+(/parcial|error/i.test(est)?'err':(estado.ultima_sync_ok?'ok':'warn'));
  txt.textContent = estado.ultima_sync_ok ? ('sync '+estado.ultima_sync_ok) : 'sin sync';
  document.getElementById('syncStatus').title='Estado: '+(est||'—');
}

// ── VISTA HOY ────────────────────────────────────────────────────────────────
function loadHoy(){
  state.view='hoy';state.cliente=null;setActiveNav('hoy');
  google.script.run.withSuccessHandler(renderHoy).withFailureHandler(showError).datosHoy();
}
function renderHoy(d){
  renderSync(d.estado);
  var m=document.getElementById('main');clear(m);
  m.appendChild(el('h1','','Hoy'));
  m.appendChild(el('div','subtle','Estado operativo del sistema · '+ (d.estado.ultima_corrida_avisos||'sin corrida de avisos')));

  // KPIs
  var kpis=el('div','grid kpis');
  [['Clientes',d.estado.clientes],['Proyectos',d.estado.proyectos],['Tareas',d.estado.tareas],
   ['Avisos activos',d.estado.avisos_activos],['Aprob. pendientes',d.estado.aprobaciones_pendientes]]
   .forEach(function(k){
     var c=el('div','card kpi');c.appendChild(el('div','num',fmtNum(k[1])));c.appendChild(el('div','lbl',k[0]));kpis.appendChild(c);
   });
  m.appendChild(kpis);

  var cols=el('div','grid cols2');cols.style.marginTop='var(--space-5)';

  // Avisos activos
  var ca=el('div','card');ca.appendChild(el('h3',null,'Avisos activos'));
  if(!d.avisos.length){ca.appendChild(el('div','empty','Sin avisos activos.'));}
  else d.avisos.forEach(function(a){
    var row=el('div','aviso');
    row.appendChild(chip((a.tipo||'').replace(/_/g,' '), AVISO_KIND[a.tipo]||'info'));
    var b=el('div','body');b.appendChild(el('div','msg',a.mensaje));
    b.appendChild(el('div','subtle',(a.id_cliente?a.id_cliente+' · ':'')+(a.fecha||'')));
    row.appendChild(b);ca.appendChild(row);
  });
  cols.appendChild(ca);

  // Aprobaciones por patrón
  var cp=el('div','card');cp.appendChild(el('h3',null,'Pendientes de aprobación por patrón'));
  var pats=Object.keys(d.aprobaciones_por_patron);
  if(!pats.length){cp.appendChild(el('div','empty','Nada pendiente de aprobación.'));}
  else pats.sort().forEach(function(p){
    var lst=d.aprobaciones_por_patron[p];
    var head=el('div');head.style.margin='var(--space-3) 0 var(--space-1)';
    head.appendChild(chip(p,'primary'));head.appendChild(el('span','subtle',' '+lst.length+' pendiente(s)'));
    cp.appendChild(head);
    lst.forEach(function(a){
      var row=el('div','aviso');var b=el('div','body');
      b.appendChild(el('div','msg',a.descripcion||a.tipo_accion||a.id));
      b.appendChild(el('div','subtle',[a.cliente,a.fecha_creacion,(a.monto!==''&&a.monto!=null?'€'+a.monto:'')].filter(Boolean).join(' · ')));
      row.appendChild(b);cp.appendChild(row);
    });
  });
  cols.appendChild(cp);
  m.appendChild(cols);

  // Próximos pasos por prioridad
  m.appendChild(el('h2','section','Próximos pasos (por prioridad)'));
  m.appendChild(tablaTareas(d.proximos_pasos, true));
}

function tablaTareas(tareas, conCliente){
  if(!tareas.length){var e=el('div','card');e.appendChild(el('div','empty','Sin tareas activas.'));return e;}
  var wrap=el('div','tablewrap');var t=el('table');
  var thead=el('thead');var htr=el('tr');
  var cols=['Prioridad','Tarea','Estado','Límite'];if(conCliente)cols.push('Cliente');
  cols.forEach(function(h){htr.appendChild(el('th',null,h));});thead.appendChild(htr);t.appendChild(thead);
  var tb=el('tbody');
  tareas.forEach(function(t0){
    var tr=el('tr');
    var c1=el('td');c1.appendChild(chip(t0.prioridad||'—',PRIOR_KIND[String(t0.prioridad).toUpperCase()]||''));tr.appendChild(c1);
    var c2=el('td');c2.appendChild(document.createTextNode(t0.descripcion||''));
    c2.appendChild(el('span','subtle',' '+(t0.id_tarea||'')));tr.appendChild(c2);
    tr.appendChild(el('td',null,t0.estado||''));
    var c4=el('td','mono');c4.appendChild(document.createTextNode(t0.fecha_limite||'—'));
    if(t0.vencida){c4.appendChild(document.createTextNode(' '));c4.appendChild(chip('vencida','danger'));}tr.appendChild(c4);
    if(conCliente)tr.appendChild(el('td',null,t0.id_cliente||''));
    tb.appendChild(tr);
  });
  t.appendChild(tb);wrap.appendChild(t);return wrap;
}

// ── PANEL CLIENTE ────────────────────────────────────────────────────────────
function loadCliente(id){
  state.view='cliente';state.cliente=id;setActiveNav('cliente',id);
  document.getElementById('main').innerHTML='';
  document.getElementById('main').appendChild(el('div','empty','Cargando cliente…'));
  google.script.run.withSuccessHandler(renderCliente).withFailureHandler(showError).datosCliente(id);
}
function renderCliente(d){
  var m=document.getElementById('main');clear(m);
  var c=d.cliente;
  var head=el('div');head.appendChild(el('h1','',c.nombre));
  var sub=el('div','subtle');
  sub.appendChild(document.createTextNode((c.id_cliente||'')+' · '+(c.rubro||'—')+' · '));
  sub.appendChild(chip(c.estado, ESTADO_KIND[c.estado]||''));
  head.appendChild(sub);
  m.appendChild(head);

  // Operatividad / ficha
  var grid=el('div','grid cols2');grid.style.marginTop='var(--space-4)';
  var fc=el('div','card');fc.appendChild(el('h3',null,'Operatividad'));
  fc.appendChild(fila('Responsable', c.responsable||'—'));
  fc.appendChild(fila('Alta', c.fecha_alta||'—'));
  var urlCli=safeUrl(c.url_sheet_cliente);
  if(urlCli){var a=el('a',null,'Abrir Sheet del cliente ↗');a.href=urlCli;a.target='_blank';a.rel='noopener noreferrer';
    var fr=el('div');fr.style.marginTop='var(--space-3)';fr.appendChild(a);fc.appendChild(fr);}
  grid.appendChild(fc);

  // Widget consumo API (stub)
  grid.appendChild(widgetConsumo(d.consumo_api));
  m.appendChild(grid);

  // Proyectos + % avance
  m.appendChild(el('h2','section','Proyectos'));
  m.appendChild(tablaProyectos(d.proyectos));

  // Próximos pasos
  m.appendChild(el('h2','section','Próximos pasos'));
  m.appendChild(tablaTareas(d.proximos_pasos, false));

  // Observaciones + Gobernanza
  var g2=el('div','grid cols2');g2.style.marginTop='var(--space-5)';
  var co=el('div','card');co.appendChild(el('h3',null,'Observaciones (Bitácora)'));
  if(!d.observaciones.length)co.appendChild(el('div','empty','Sin observaciones.'));
  else d.observaciones.slice().reverse().forEach(function(o){
    var row=el('div','aviso');var b=el('div','body');
    b.appendChild(el('div','msg',o.observacion||''));
    b.appendChild(el('div','subtle',[o.fecha,o.etiqueta].filter(Boolean).join(' · ')));
    row.appendChild(b);co.appendChild(row);
  });
  g2.appendChild(co);

  var cg=el('div','card');cg.appendChild(el('h3',null,'Gobernanza'));
  var g=d.gobernanza;
  if(!g)cg.appendChild(el('div','empty','Sin ficha de gobernanza.'));
  else{
    cg.appendChild(fila('Qué corre solo', g.que_corre_solo||'—'));
    cg.appendChild(fila('Qué se aprueba', g.que_se_aprueba||'—'));
    cg.appendChild(fila('Backup', g.backup||'—'));
    cg.appendChild(fila('Última revisión', g.ultima_revision||'—'));
    var urlDoc=safeUrl(g.link_documentacion);
    if(urlDoc){var a=el('a',null,'Documentación ↗');a.href=urlDoc;a.target='_blank';a.rel='noopener noreferrer';
      var fr=el('div');fr.style.marginTop='var(--space-2)';fr.appendChild(a);cg.appendChild(fr);}
  }
  g2.appendChild(cg);
  m.appendChild(g2);
}

function fila(k,v){
  var r=el('div');r.style.display='flex';r.style.justifyContent='space-between';r.style.gap='var(--space-4)';
  r.style.padding='var(--space-2) 0';r.style.borderBottom='1px solid var(--color-border)';
  r.appendChild(el('span','muted',k));var vv=el('span',null,String(v));vv.style.textAlign='right';r.appendChild(vv);return r;
}

function tablaProyectos(ps){
  if(!ps.length){var e=el('div','card');e.appendChild(el('div','empty','Sin proyectos.'));return e;}
  var wrap=el('div','tablewrap');var t=el('table');
  var thead=el('thead');var htr=el('tr');
  ['Proyecto','Estado','% avance','Próximo hito','Objetivo'].forEach(function(h){htr.appendChild(el('th',null,h));});
  thead.appendChild(htr);t.appendChild(thead);
  var tb=el('tbody');
  ps.forEach(function(p){
    var tr=el('tr');
    var c1=el('td');c1.appendChild(document.createTextNode(p.nombre||''));c1.appendChild(el('span','subtle',' '+(p.id_proyecto||'')));tr.appendChild(c1);
    tr.appendChild(el('td',null,p.estado||''));
    // PURGA #2: Sheets guarda "45%" como 0.45; normalizar fracción 0<r≤1 → ×100.
    var raw=Number(String(p.avance).replace('%',''))||0;
    if(raw>0&&raw<=1)raw=raw*100;
    var pct=Math.max(0,Math.min(100,raw));
    var c3=el('td');var wrapBar=el('div');wrapBar.style.display='flex';wrapBar.style.alignItems='center';wrapBar.style.gap='var(--space-2)';
    var bar=el('div','bar');var span=el('span');span.style.width=pct+'%';bar.appendChild(span);
    wrapBar.appendChild(bar);wrapBar.appendChild(el('span','mono',pct+'%'));c3.appendChild(wrapBar);tr.appendChild(c3);
    tr.appendChild(el('td',null,p.proximo_hito||'—'));
    tr.appendChild(el('td','mono',p.fecha_objetivo||'—'));
    tb.appendChild(tr);
  });
  t.appendChild(tb);wrap.appendChild(t);return wrap;
}

function widgetConsumo(co){
  var c=el('div','card');c.appendChild(el('h3',null,'Consumo API (stub)'));
  if(co.error){c.appendChild(el('div','empty','No se pudo leer Costos_API: '+co.error));return c;}
  var k=el('div','grid kpis');
  [['Llamadas',fmtNum(co.llamadas)],['Tokens in',fmtNum(co.tokens_in)],['Tokens out',fmtNum(co.tokens_out)],['USD','$'+fmtNum(co.usd)]]
   .forEach(function(x){var cc=el('div');cc.appendChild(el('div','num',x[1]));cc.style.minWidth='0';
     var n=cc.firstChild;n.style.fontSize='var(--text-xl)';cc.appendChild(el('div','lbl',x[0]));k.appendChild(cc);});
  c.appendChild(k);
  c.appendChild(el('div','subtle','Etapa 1: solo agrega filas registradas. Estimación de tokens/USD → Etapa 2.'));
  return c;
}
